<svg width="860" height="318" viewBox="0 0 860 318" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Total token cost saved by workflow">
  <style>
    .mono { font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; }
    .lbl { font-size: 16px; font-weight: 700; }
    .sub { font-size: 11px; }
    .val { font-size: 15px; font-weight: 700; }
    .tick { font-size: 10px; }
  </style>
  <defs>
    <linearGradient id="save" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3fd6a4"/>
      <stop offset="1" stop-color="#1fb588"/>
    </linearGradient>
  </defs>

  <text x="24" y="34" class="mono" font-size="20" font-weight="700" fill="#2b3440">Total token cost saved <tspan fill="#1fb588">per dev workflow</tspan></text>
  <text x="24" y="58" class="mono" font-size="13" fill="#57606a">Command output drops 99.9% (measured). Your <tspan font-weight="700">total</tspan> saving depends on how log-heavy you are:</text>
  <line x1="230" y1="94" x2="230" y2="250" stroke="#eef1f4" stroke-width="1"/>
  <text x="230" y="88" text-anchor="middle" class="mono tick" fill="#b0b8c1">0%</text><line x1="367.5" y1="94" x2="367.5" y2="250" stroke="#eef1f4" stroke-width="1"/>
  <text x="367.5" y="88" text-anchor="middle" class="mono tick" fill="#b0b8c1">25%</text><line x1="505" y1="94" x2="505" y2="250" stroke="#eef1f4" stroke-width="1"/>
  <text x="505" y="88" text-anchor="middle" class="mono tick" fill="#b0b8c1">50%</text><line x1="642.5" y1="94" x2="642.5" y2="250" stroke="#eef1f4" stroke-width="1"/>
  <text x="642.5" y="88" text-anchor="middle" class="mono tick" fill="#b0b8c1">75%</text><line x1="780" y1="94" x2="780" y2="250" stroke="#eef1f4" stroke-width="1"/>
  <text x="780" y="88" text-anchor="middle" class="mono tick" fill="#b0b8c1">100%</text>
  
  <text x="214" y="116" text-anchor="end" class="mono lbl" fill="#2b3440">Light</text>
  <text x="214" y="132" text-anchor="end" class="mono sub" fill="#8b949e">mostly reading / editing</text>
  <rect x="230" y="104" width="550" height="26" rx="6" fill="#eef1f4"/>
  <rect x="230" y="104" width="99" height="26" rx="6" fill="url(#save)"/>
  <text x="341" y="122" class="mono val" fill="#1fb588">~18%</text>
  <text x="214" y="172" text-anchor="end" class="mono lbl" fill="#2b3440">Typical</text>
  <text x="214" y="188" text-anchor="end" class="mono sub" fill="#8b949e">regular test / build loops</text>
  <rect x="230" y="160" width="550" height="26" rx="6" fill="#eef1f4"/>
  <rect x="230" y="160" width="165" height="26" rx="6" fill="url(#save)"/>
  <text x="407" y="178" class="mono val" fill="#1fb588">~30%</text>
  <text x="214" y="228" text-anchor="end" class="mono lbl" fill="#2b3440">Heavy</text>
  <text x="214" y="244" text-anchor="end" class="mono sub" fill="#8b949e">TDD · CI-debug · full builds</text>
  <rect x="230" y="216" width="550" height="26" rx="6" fill="#eef1f4"/>
  <rect x="230" y="216" width="303" height="26" rx="6" fill="url(#save)"/>
  <text x="545" y="234" class="mono val" fill="#1fb588">~55%</text>
  <text x="24" y="302" class="mono" font-size="11" fill="#8b949e">Modeled: total saving ≈ (share of context that is command output) × 99%.</text>
</svg>