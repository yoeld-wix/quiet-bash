<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 232" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="sinL" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#10b981"/><stop offset="1" stop-color="#0b8c62"/></linearGradient>
    <linearGradient id="soutL" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#f08a52"/><stop offset="1" stop-color="#c2410c"/></linearGradient>
  </defs>
  <rect width="860" height="232" rx="14" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="859" height="231" rx="13.5" fill="none" stroke="#e4e9f0"/>

  <text x="36" y="46" fill="#111827" font-size="21" font-weight="650">Input + output: they stack, not compete</text>
  <text x="36" y="68" fill="#6b7686" font-size="12.5">One turn's cost has two disjoint sources. Each tool attacks a different half — run both for full coverage.</text>

  <rect x="36" y="92" width="394" height="54" rx="8" fill="url(#sinL)"/>
  <rect x="434" y="92" width="390" height="54" rx="8" fill="url(#soutL)"/>
  <text x="233" y="118" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="800" letter-spacing="1.1" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">INPUT</text>
  <text x="233" y="135" text-anchor="middle" fill="#eafff7" font-size="11">what re-enters context</text>
  <text x="629" y="118" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="800" letter-spacing="1.1" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">OUTPUT</text>
  <text x="629" y="135" text-anchor="middle" fill="#fff3ec" font-size="11">code the model writes</text>

  <rect x="36" y="162" width="10" height="10" rx="2.5" fill="#0b8c62"/>
  <text x="52" y="171" fill="#475569" font-size="12.5"><tspan font-weight="600" fill="#111827">quiet-bash</tspan> — mechanical hooks/proxy, lossless. 94–99.9% per op (measured).</text>
  <rect x="36" y="186" width="10" height="10" rx="2.5" fill="#c2410c"/>
  <text x="52" y="195" fill="#475569" font-size="12.5"><tspan font-weight="600" fill="#111827">Concise + minimal-change</tspan> (or <tspan font-weight="600" fill="#111827">ponytail</tspan>) — behavioral, trims generated code/prose.</text>

  <text x="36" y="221" fill="#94a3b8" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">Disjoint cost sources → installing both compounds. Field map: docs/comparison.md</text>
</svg>
