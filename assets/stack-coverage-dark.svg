<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 232" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="sbgD" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#11192a"/><stop offset="1" stop-color="#0c1320"/></linearGradient>
    <linearGradient id="sinD" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#1fb588"/><stop offset="1" stop-color="#17a079"/></linearGradient>
    <linearGradient id="soutD" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#c97a61"/><stop offset="1" stop-color="#b3603f"/></linearGradient>
  </defs>
  <rect width="860" height="232" rx="14" fill="url(#sbgD)"/>
  <rect x="0.5" y="0.5" width="859" height="231" rx="13.5" fill="none" stroke="#243046"/>

  <text x="36" y="46" fill="#eaf0f7" font-size="21" font-weight="650">Input + output: they stack, not compete</text>
  <text x="36" y="68" fill="#7d8ba0" font-size="12.5">One turn's cost has two disjoint sources. Each tool attacks a different half — run both for full coverage.</text>

  <rect x="36" y="92" width="394" height="54" rx="8" fill="url(#sinD)"/>
  <rect x="434" y="92" width="390" height="54" rx="8" fill="url(#soutD)"/>
  <text x="233" y="118" text-anchor="middle" fill="#06251c" font-size="13" font-weight="800" letter-spacing="1.1" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">INPUT</text>
  <text x="233" y="135" text-anchor="middle" fill="#0a3326" font-size="11">what re-enters context</text>
  <text x="629" y="118" text-anchor="middle" fill="#2a120a" font-size="13" font-weight="800" letter-spacing="1.1" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">OUTPUT</text>
  <text x="629" y="135" text-anchor="middle" fill="#34170d" font-size="11">code the model writes</text>

  <rect x="36" y="162" width="10" height="10" rx="2.5" fill="#1fb588"/>
  <text x="52" y="171" fill="#aeb9c8" font-size="12.5"><tspan font-weight="600" fill="#eaf0f7">quiet-bash</tspan> — mechanical hooks/proxy, lossless. 94–99.9% per op (measured).</text>
  <rect x="36" y="186" width="10" height="10" rx="2.5" fill="#c97a61"/>
  <text x="52" y="195" fill="#aeb9c8" font-size="12.5"><tspan font-weight="600" fill="#eaf0f7">Concise + minimal-change</tspan> (or <tspan font-weight="600" fill="#eaf0f7">ponytail</tspan>) — behavioral, trims generated code/prose.</text>

  <text x="36" y="221" fill="#5b6b80" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">Disjoint cost sources → installing both compounds. Field map: docs/comparison.md</text>
</svg>
