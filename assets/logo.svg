<svg width="820" height="200" viewBox="0 0 820 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="quiet-bash: less log. same signal.">
  <title>quiet-bash</title>

  <!-- ICON: two noisy log lines collapse, through a bash chevron prompt, into one bold quiet teal line. -->
  <g transform="translate(16,28)">
    <rect x="0" y="0" width="144" height="144" rx="32" fill="#11161d"/>
    <rect x="1.25" y="1.25" width="141.5" height="141.5" rx="30.75" fill="none" stroke="#39d3a0" stroke-opacity="0.22" stroke-width="2.5"/>

    <g fill="#5b6e83">
      <rect x="32" y="46" width="52" height="9" rx="4.5"/>
      <rect x="32" y="64" width="36" height="9" rx="4.5" fill-opacity="0.55"/>
    </g>

    <path d="M85 44 L104 64 L85 84" fill="none" stroke="#39d3a0" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="32" y="92" width="72" height="10" rx="5" fill="#39d3a0"/>
  </g>

  <!-- WORDMARK -->
  <g transform="translate(196,0)">
    <text x="0" y="108" font-family="ui-monospace, &quot;SF Mono&quot;, SFMono-Regular, Menlo, Consolas, monospace" font-size="64" font-weight="600" letter-spacing="-1">
      <tspan fill="#5b6e83">quiet</tspan><tspan fill="#1fb588">-bash</tspan>
    </text>

    <text x="2" y="142" font-family="ui-monospace, &quot;SF Mono&quot;, SFMono-Regular, Menlo, Consolas, monospace" font-size="22" letter-spacing="0.5" fill="#7d8896">
      <tspan>less log.</tspan><tspan fill="#39d3a0" dx="10">same signal.</tspan>
    </text>
  </g>
</svg>
