<svg width="760" height="220" viewBox="0 0 760 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="quiet-bash">
  <style>
    .mono { font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; }
  </style>

  <!-- terminal panel -->
  <rect x="28" y="40" width="214" height="140" rx="16" fill="#11161d" stroke="#232b36" stroke-width="2"/>
  <!-- title-bar dots -->
  <circle cx="54" cy="66" r="5" fill="#ff5f56"/>
  <circle cx="72" cy="66" r="5" fill="#febc2e"/>
  <circle cx="90" cy="66" r="5" fill="#28c840"/>
  <line x1="44" y1="84" x2="226" y2="84" stroke="#232b36" stroke-width="2"/>

  <!-- verbose log lines (muted) collapsing... -->
  <rect x="52" y="100" width="156" height="6" rx="3" fill="#2f3a48"/>
  <rect x="52" y="114" width="132" height="6" rx="3" fill="#2f3a48"/>
  <rect x="52" y="128" width="168" height="6" rx="3" fill="#2f3a48"/>
  <!-- ...into one bright summary line -->
  <rect x="52" y="150" width="60" height="8" rx="4" fill="#39d3a0"/>
  <text x="120" y="158" class="mono" font-size="15" fill="#39d3a0">ok ✓</text>

  <!-- wordmark -->
  <text x="276" y="118" class="mono" font-size="62" font-weight="700">
    <tspan fill="#5b6e83">quiet</tspan><tspan fill="#1fb588">·bash</tspan>
  </text>
  <text x="278" y="156" class="mono" font-size="22" fill="#7d8896">less log. same signal.</text>
</svg>
